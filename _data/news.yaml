items:
  - date: "2025-11-03"
    content: "We placed <b>#4</b> in [DCVLR](https://dcvlr-neurips.github.io/), a vision-language reasoning competition at the NeurIPS 2025 Workshop."

  - date: "2026-01-27"
    content: "We introduced [SciGenBench and ImgCoder](https://scigenbench.github.io/), aiming to make scientific image synthesis focus more on structure, precision, and actual reasoning."

  - date: "2026-01-29"
    content: "We released [MMFineReason](https://mmfinereason.github.io/), taking a data-centric route to improve multimodal reasoning: our 4B VLM reaches 30B-level performance. The corresponding reasoning dataset [MMFineReason-1.8M](https://huggingface.co/datasets/OpenDataArena/MMFineReason-1.8M-Qwen3-VL-235B-Thinking) reached <b>#2</b> on HuggingFace Datasets Trending with <b>25k+</b> downloads shortly after release."

  - date: "2026-04-06"
    content: "[ImplicitMemBench](http://arxiv.org/abs/2604.08064) was accepted to ACL 2026 Main Conference, and [SAVOIR](https://arxiv.org/abs/2604.18982) was accepted to ACL 2026 Findings. Thanks again to all collaborators!"

  - date: "2026-05-07"
    content: "We introduced [The Granularity Axis](http://arxiv.org/abs/2605.06196), an attempt to find the hidden micro-to-macro slider behind how LLMs reason as individuals, institutions, and nations."